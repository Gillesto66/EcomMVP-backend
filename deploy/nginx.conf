# Auteur : Gilles - Projet : AGC Space - Module : Déploiement Nginx
# Reverse proxy Nginx pour AGC Space
# Emplacement : /etc/nginx/sites-available/agcspace
# Activer : ln -s /etc/nginx/sites-available/agcspace /etc/nginx/sites-enabled/

# ── Cache Nginx (proxy_cache_path OBLIGATOIRE avant les blocs server) ─────────
# Stocke jusqu'à 100 MB de cache sur disque, TTL max 10 min, zone nommée "agc_cache"
proxy_cache_path /var/cache/nginx/agcspace
    levels=1:2
    keys_zone=agc_cache:10m
    max_size=100m
    inactive=10m
    use_temp_path=off;

upstream agcspace_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

# ── Zones de rate limiting par IP ─────────────────────────────────────────────
# login : 10 req/min par IP (anti brute-force)
limit_req_zone $binary_remote_addr zone=login_zone:10m rate=10r/m;
# register : 5 req/min par IP (anti spam)
limit_req_zone $binary_remote_addr zone=register_zone:10m rate=5r/m;
# validate affiliation : 30 req/min par IP
limit_req_zone $binary_remote_addr zone=validate_zone:10m rate=30r/m;
# API générale : 100 req/min par IP
limit_req_zone $binary_remote_addr zone=api_zone:10m rate=100r/m;

# Redirection HTTP → HTTPS
server {
    listen 80;
    server_name votre-domaine.com www.votre-domaine.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name votre-domaine.com www.votre-domaine.com;

    # ── SSL (Let's Encrypt via Certbot) ──────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/votre-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/votre-domaine.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_prefer_server_ciphers on;

    # ── Sécurité headers ─────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Content Security Policy ───────────────────────────────────────────────
    # Autorise : scripts/styles du même domaine + CDN Stripe + fonts Google
    # Bloque : inline scripts non noncés, iframes tierces, objets Flash
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline' https://js.stripe.com https://cdn.jsdelivr.net;
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' https://fonts.gstatic.com;
        img-src     'self' data: blob: https:;
        connect-src 'self' https://api.stripe.com;
        frame-src   https://js.stripe.com https://hooks.stripe.com;
        object-src  'none';
        base-uri    'self';
        form-action 'self';
    " always;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/agcspace_access.log;
    error_log  /var/log/nginx/agcspace_error.log warn;

    # ── Taille max upload (avatars, images produits) ──────────────────────────
    client_max_body_size 10M;

    # ── Compression gzip ─────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # ── Fichiers statiques Django ─────────────────────────────────────────────
    location /static/ {
        alias /var/www/agcspace/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # ── Fichiers media (avatars, images produits) ─────────────────────────────
    location /media/ {
        alias /var/www/agcspace/media/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # ── Endpoints sensibles avec rate limiting ────────────────────────────────

    location = /api/v1/auth/login/ {
        limit_req zone=login_zone burst=5 nodelay;
        limit_req_status 429;
        proxy_pass         http://agcspace_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/v1/auth/register/ {
        limit_req zone=register_zone burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://agcspace_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /api/v1/affiliations/validate/ {
        limit_req zone=validate_zone burst=10 nodelay;
        limit_req_status 429;
        proxy_pass         http://agcspace_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Endpoint de rendu public — double cache Redis + Nginx ─────────────────
    location ~ ^/api/v1/render/(\d+)/$ {
        limit_req zone=api_zone burst=20 nodelay;
        proxy_pass         http://agcspace_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;

        # Cache Nginx — 1 min (Redis est la source de vérité à 5 min)
        proxy_cache        agc_cache;
        proxy_cache_valid  200 1m;
        proxy_cache_valid  404 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock   on;
        add_header         X-Cache-Status $upstream_cache_status;
        add_header         Cache-Control "public, max-age=60";
    }

    # ── API Django via Gunicorn ───────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_zone burst=50 nodelay;
        limit_req_status 429;
        proxy_pass         http://agcspace_backend;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_redirect     off;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # ── Admin Django ──────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass       http://agcspace_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Restreindre l'accès admin à des IPs spécifiques en production
        # allow 1.2.3.4;
        # deny all;
    }

    # ── Health check ──────────────────────────────────────────────────────────
    location /health/ {
        proxy_pass http://agcspace_backend;
        access_log off;
        # Pas de cache sur le health check — doit toujours être frais
        proxy_cache off;
    }

    # ── Page d'erreur 429 (rate limit dépassé) ────────────────────────────────
    error_page 429 /429.json;
    location = /429.json {
        internal;
        default_type application/json;
        return 429 '{"detail":"Trop de requêtes. Veuillez patienter.","code":"throttled"}';
    }
}
