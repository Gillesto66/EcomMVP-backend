# Auteur : Gilles - Projet : AGC Space - Module : Configuration Tests
[pytest]
DJANGO_SETTINGS_MODULE = agc_core.settings_test
python_files = tests.py test_*.py tests_*.py *_test.py
python_classes = Test
python_functions = test_
addopts = -v --tb=short --strict-markers
markers =
    django_db: Tests nécessitant la base de données
    slow: Tests lents (E2E, intégration)
